<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajeeb Tech Online | Bio Link</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #00f2fe;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }
        /* বড় টেক্সটের জন্য স্টাইল */
        h1 {
            font-size: 32px;
            margin: 10px 0;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
        /* বড় বিবরণের জন্য স্টাইল */
        .bio-text {
            font-size: 18px;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .bio-link {
            display: block;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
            transition: all 0.3s ease;
        }
        .bio-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- আপনার ছবি (আপাতত টেমপ্লেটের পুরোনো ছবিটাই থাকবে) -->
        <img src="assets/images/image.jpg" alt="Sajeeb" class="profile-img">

        <!-- বড় করে আপনার নাম বা হেডলাইন -->
        <h1>Sajeeb Tech Online</h1>

        <!-- আপনার বড় টেক্সট বা ডেসক্রিপশন এখানে লিখুন -->
        <p class="bio-text">
            Welcome to my official bio website! I create content on YouTube and share regular updates on my Facebook page and Telegram channel. Stay connected to get the latest tech tricks and tips!
        </p>

        <!-- সোশ্যাল মিডিয়া লিঙ্কসমূহ -->
        <div class="links-container">
            <a href="https://www.youtube.com/@GmailCreateBD" target="_blank" class="bio-link">📺 YouTube Channel</a>
            <a href="https://www.facebook.com/sajeeb.mia.31" target="_blank" class="bio-link">🌐 Facebook Page</a>
            <a href="আপনার_টেলিগ্রাম_লিঙ্ক_এখানে_দিন" target="_blank" class="bio-link">✈️ Telegram Channel</a>
        </div>
    </div>

</body>
</html>
